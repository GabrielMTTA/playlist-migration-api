worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Security Headers ──
    server_tokens off;

    # ── Rate Limiting Zone ──
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # ── Upstream: API replicas ──
    upstream api_backend {
        least_conn;
        server api:8000;
    }

    # ── HTTP → HTTPS redirect ──
    server {
        listen 80;
        server_name playlistzinha.duckdns.org;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS ──
    server {
        listen 443 ssl;
        server_name playlistzinha.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/playlistzinha.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/playlistzinha.duckdns.org/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Global Security Headers ──
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Request Size Limit ──
        client_max_body_size 2m;

        # ── CORS preflight ──
        location / {
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin $http_origin always;
                add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header Access-Control-Allow-Headers 'Authorization, Content-Type, Accept' always;
                add_header Access-Control-Allow-Credentials 'true' always;
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Type 'text/plain; charset=utf-8';
                add_header Content-Length 0;
                return 204;
            }

            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Origin $http_origin;
            proxy_http_version 1.1;

            # CORS headers para respostas normais
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials 'true' always;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # ── Health Check ──
        location /health {
            proxy_pass http://api_backend/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
